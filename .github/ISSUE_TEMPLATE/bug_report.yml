name: Bug report
description: Report reproducible incorrect behavior.
title: "[Bug]: "
labels: [bug]
body:
  - type: markdown
    attributes:
      value: Do not include private file contents, credentials, or sensitive paths. Use disposable directories when possible.
  - type: input
    id: version
    attributes:
      label: Application version
      placeholder: 1.0.0
    validations:
      required: true
  - type: input
    id: windows
    attributes:
      label: Windows version and architecture
      placeholder: Windows 11 24H2, x64
    validations:
      required: true
  - type: dropdown
    id: operation
    attributes:
      label: Operation
      options:
        - Copy
        - Move
        - Preview
        - Explorer context menu
        - Startup or settings
        - Other
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction
      description: Include source/destination relationships, link mode, exclusion settings, and the smallest safe reproduction.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: observed
    attributes:
      label: Observed behavior
    validations:
      required: true
  - type: textarea
    id: log
    attributes:
      label: Sanitized log excerpt
      description: Remove private paths before pasting. Do not attach logs that expose personal data.
      render: text
  - type: checkboxes
    id: checks
    attributes:
      label: Checks
      options:
        - label: I tested with disposable data or have a backup of important data.
          required: true
        - label: I removed private paths and file contents from this report.
          required: true
